// ============================================================
//  平台生成
// ============================================================
function makePlat(x, y, type) {
  // 移动平台速度和范围：从 DIFF_TABLE 读取当前难度的精确配置
  const cfg = DIFF_TABLE[currentDiffLevel];
  const [spdMin, spdMax] = cfg.movSpd;
  const [rngMin, rngMax] = cfg.movRange;
  const mspd = spdMin + Math.random() * (spdMax - spdMin);
  const mrange = rngMin + Math.random() * (rngMax - rngMin);

  // 确保移动平台不会移出画面（限制 ox ± mrange 在屏幕内）
  const halfW = (type==='spring'?90 : type==='crumble'?85 : 100) / 2;
  const margin = 5; // 边缘留一点间距
  let ox = x;
  if (type === 'moving') {
    const leftLimit = halfW + margin + mrange;
    const rightLimit = W - halfW - margin - mrange;
    ox = Math.max(leftLimit, Math.min(rightLimit, ox));
  }

  return {
    x: ox, y, type,
    w: type==='spring'?90 : type==='crumble'?85 : 100,
    h: 13,
    alive: true,
    // moving
    ox: ox, mdir: Math.random()<.5?1:-1, mspd, mrange,
    // anim
    shimmer: Math.random()*Math.PI*2,
    breakT: 0, vanishT: 0, springT: 0, springSquash: 0,
    crumbleT: 0,          // 碎裂平台动画（1→0，踩到瞬间开始）
    crumbleShards: null,   // 碎片粒子数组（碎裂时生成）
    // 蹦床（固定在平台上的交互物）
    hasTrampoline: false,  // 是否有蹦床
    trampolineT: 0,       // 蹦床弹跳动画计时
    // 消失/碎裂后的恢复机制
    dormant: false,        // 是否处于休眠状态（消失后等待重生）
    dormantTimer: 0,       // 休眠倒计时（帧数）
  };
}

function seedPlatforms() {
  // 脚下初始平台
  platforms.push(makePlat(W/2, H - 40, 'normal'));
  let ly = H - 40;
  for (let i=0; i<30; i++) {
    const gap = BASE_GAP + Math.random()*25;
    ly -= gap;
    const x = 55 + Math.random()*(W-110);
    const type = i < 6 ? 'normal' : randType();
    const p = makePlat(x, ly, type);
    platforms.push(p);
    segPlatRemain--;  // 初始平台也消耗段配额

    // 第8个平台之后按概率额外插入碎裂平台（可同高度，但不能重叠）
    if (i >= 8) {
      const cfg = DIFF_TABLE[currentDiffLevel];
      const cr = cfg.crumbleRate || 0;
      if (cr > 0 && Math.random() < cr) {
        // crumble 可以出现在同一高度层，也可以在间隙中
        const usesSameHeight = Math.random() < 0.5;
        const crumbleY = usesSameHeight ? ly : ly + gap * (0.3 + Math.random() * 0.4);
        const crumbleX = findNonOverlapX(crumbleY, 85);
        if (crumbleX !== null) {
          platforms.push(makePlat(crumbleX, crumbleY, 'crumble'));
        }
      }
    }

    // 放道具
    if (i > 4 && Math.random() < .13) spawnItem(x, ly - 28);
  }
}

function randType() {
  const cfg = DIFF_TABLE[currentDiffLevel];
  const t = cfg.types;
  const r = Math.random();
  let acc = 0;
  acc += t.normal;    if (r < acc) return 'normal';
  acc += t.moving;    if (r < acc) return 'moving';
  acc += t.spring;    if (r < acc) return 'spring';
  return 'vanish';
}

// 在指定高度层找一个不和现有平台重叠的 X 坐标
// platW 是要放置的平台宽度，返回 null 表示找不到空位
function findNonOverlapX(targetY, platW) {
  const margin = 10;  // 最小间距
  // 收集同高度层（Y 差距 < 20px）的平台
  const nearby = platforms.filter(p => Math.abs(p.y - targetY) < 20 && p.alive);
  for (let attempt = 0; attempt < 8; attempt++) {
    const cx = 55 + Math.random() * (W - 110);
    let overlap = false;
    for (const p of nearby) {
      const dist = Math.abs(cx - p.x);
      const minDist = (platW / 2 + p.w / 2) + margin;
      if (dist < minDist) { overlap = true; break; }
    }
    if (!overlap) return cx;
  }
  return null; // 8次尝试都失败，放弃生成
}

function generateUp() {
  const ceiling = cameraY - H;
  let top = Math.min(...platforms.map(p=>p.y));
  let prevStableY = top;  // 上一个稳定平台的 Y 坐标

  while (top > ceiling) {
    // 当前段用完 → 推进到下一段
    if (segPlatRemain <= 0) {
      advanceSegment();
    }

    const cfg = DIFF_TABLE[currentDiffLevel];
    // 间距基于难度等级的 gapMul
    let gap = BASE_GAP + (MAX_GAP - BASE_GAP) * cfg.gapMul;
    gap = gap * (.72 + Math.random()*.5);
    gap = Math.min(gap, SAFE_GAP);
    top -= gap;

    // 生成稳定平台（非 crumble）
    const x = 55 + Math.random()*(W-110);
    const type = randType();
    const p = makePlat(x, top, type);
    // 蹦床：在 normal/moving 平台上有概率附加蹦床（替代原暖暖之翼的超级弹跳功能）
    if ((type === 'normal' || type === 'moving') && Math.random() < 0.06) {
      p.hasTrampoline = true;
    }
    platforms.push(p);
    segPlatRemain--;

    // ---- 额外插入碎裂平台（陷阱） ----
    // crumble 可以和稳定平台出现在同一高度层，但不能物理重叠
    const cr = cfg.crumbleRate || 0;
    if (cr > 0 && Math.random() < cr) {
      const usesSameHeight = Math.random() < 0.5;
      const crumbleY = usesSameHeight ? top : top + gap * (0.3 + Math.random() * 0.4);
      const crumbleX = findNonOverlapX(crumbleY, 85);
      if (crumbleX !== null) {
        platforms.push(makePlat(crumbleX, crumbleY, 'crumble'));
      }
    }

    prevStableY = top;

    // 道具生成（根据关卡段）— 护盾已独立，不在这里生成
    if (Math.random() < cfg.itemRate) spawnItem(x, top - 28);
    // 怪物生成（根据关卡段）— 同步在怪物下方平台放护盾
    if (cfg.monsterRate > 0 && Math.random() < cfg.monsterRate) {
      spawnMonster(30+Math.random()*(W-60), top - 55);
      // 19% 概率在怪物下方平台放护盾（需要高度间隔检测 + 平台重叠检测）
      if (Math.random() < 0.19 && !isItemTooClose(top - 28)) {
        const shieldX = Math.max(30, Math.min(W - 30, x + (Math.random() - 0.5) * 40));
        if (!isItemOverlapPlatform(shieldX, top - 28, 22, 22)) {
          items.push({x: shieldX, y: top - 28, type:'shield', w:22, h:22, alive:true, ph:Math.random()*6.28, sp:0});
        }
      }
    }
  }
}

// ============================================================
//  道具
// ============================================================
const ITEM_MIN_GAP_Y = 80;  // 道具之间的最小垂直间距（像素）
const HEART_UNLOCK_PX = 8000;  // 1000米 × 8px/m = 8000px，前1000米不刷心心

// 检查指定高度是否和现有道具太近
function isItemTooClose(y) {
  for (const it of items) {
    if (!it.alive) continue;
    if (Math.abs(it.y - y) < ITEM_MIN_GAP_Y) return true;
  }
  return false;
}

// 检查道具位置是否和平台（含碎裂平台）重叠
function isItemOverlapPlatform(x, y, w, h) {
  for (const p of platforms) {
    if (!p.alive) continue;
    // 水平和垂直都有交集 → 重叠
    if (Math.abs(x - p.x) < (w / 2 + p.w / 2 + 8) &&
        Math.abs(y - p.y) < (h / 2 + p.h / 2 + 6)) {
      return true;
    }
  }
  return false;
}

function spawnItem(x, y) {
  // 高度间隔检测：如果附近已有道具，直接不刷新
  if (isItemTooClose(y)) return;

  // 护盾已移至怪物同步刷新，这里只生成 star/feihua/heart
  // 判断是否解锁了心心（前1000米不刷）
  const heartUnlocked = (H - 80 - y) > HEART_UNLOCK_PX;

  const r = Math.random();
  let t;
  if (heartUnlocked) {
    // 1000米后：star 55% / feihua 37% / heart 8%
    if (r < 0.55)      t = 'star';
    else if (r < 0.92) t = 'feihua';
    else                t = 'heart';   // ~8% 概率生成回血心心
  } else {
    // 前1000米：只有 star 和 feihua
    if (r < 0.60)      t = 'star';
    else                t = 'feihua';
  }

  const sz = t === 'star' ? 28 : 22;

  // 检测与平台重叠：如果重叠则尝试微调位置
  let finalX = x, finalY = y;
  if (isItemOverlapPlatform(finalX, finalY, sz, sz)) {
    let placed = false;
    for (let att = 0; att < 10; att++) {
      const tryX = 30 + Math.random() * (W - 60);
      const tryY = y + (Math.random() - 0.5) * 30;
      if (!isItemOverlapPlatform(tryX, tryY, sz, sz)) {
        finalX = tryX; finalY = tryY;
        placed = true;
        break;
      }
    }
    if (!placed) return; // 找不到合适位置则放弃
  }

  items.push({x:finalX, y:finalY, type:t, w:sz, h:sz, alive:true, ph:Math.random()*6.28, sp:0});
}

// ============================================================
//  怪物
// ============================================================
const MONSTER_PLAT_GAP = 80;   // 怪物与平台的最小垂直间距（像素）
const MONSTER_MIN_GAP_Y = 100; // 怪物之间的最小垂直间距（像素），防止扎堆

function spawnMonster(x, y) {
  const t = Math.random()<.6?'shadow':'rain';
  const mw = 30, mh = 30;
  const MOVE_MARGIN = 75;   // 动态怪物(shadow)与平台的最小水平间距（含移动范围冗余）

  // 先检查与已有怪物的垂直间距 — 太近就直接放弃
  for (const m of monsters) {
    if (!m.alive) continue;
    if (Math.abs(m.y - y) < MONSTER_MIN_GAP_Y) return;
  }

  // 尝试找到不和任何平台重叠且保持间距的位置
  let finalX = x, finalY = y;
  let found = false;
  for (let attempt = 0; attempt < 30; attempt++) {
    const tryX = attempt === 0 ? x : 30 + Math.random() * (W - 60);
    const tryY = attempt === 0 ? y : y + (Math.random() - 0.5) * 100;
    let overlap = false;

    // 检查与所有平台的间距
    for (const p of platforms) {
      if (!p.alive || p.dormant) continue;
      // 对移动平台，间距要考虑其完整运动范围(ox ± mrange)
      let marginX;
      if (t === 'shadow') {
        marginX = MOVE_MARGIN;
      } else {
        // 静态怪物：移动平台需额外加上 mrange，确保平台移到最远处也不重叠
        marginX = MONSTER_PLAT_GAP + (p.type === 'moving' ? p.mrange : 0);
      }
      if (Math.abs(tryX - p.x) < (mw/2 + p.w/2 + marginX) &&
          Math.abs(tryY - p.y) < (mh/2 + p.h/2 + MONSTER_PLAT_GAP)) {
        overlap = true;
        break;
      }
    }

    // 检查与已有怪物的垂直间距
    if (!overlap) {
      for (const m of monsters) {
        if (!m.alive) continue;
        if (Math.abs(tryY - m.y) < MONSTER_MIN_GAP_Y) {
          overlap = true;
          break;
        }
      }
    }

    if (!overlap) {
      finalX = tryX;
      finalY = tryY;
      found = true;
      break;
    }
  }
  // 间距不够 → 不生成，绝不强行刷新
  if (!found) return;
  monsters.push({x:finalX, y:finalY, type:t, w:mw, h:mh, vx:t==='shadow'?(Math.random()<.5?0.8:-0.8):0, alive:true, ph:Math.random()*6.28});
}

// ============================================================
//  粒子
// ============================================================
function emitBurst(x,y,n,color,spd,life){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28, s=Math.random()*spd;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:Math.random()*life+life*.4,ml:life*1.4,color,sz:Math.random()*3+1.5});
  }
}

// ---- 飘字系统（简洁黑字） ----
let floatTexts = [];
function emitFloatText(x, y, text, color, size) {
  floatTexts.push({
    x, y, text, color,
    size: size || 16,
    life: 70,
    ml: 70,
    vy: -1.5,
    age: 0,
  });
}
function tickFloatTexts() {
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const ft = floatTexts[i];
    ft.age++;
    ft.y += ft.vy;
    ft.vy *= 0.96;
    ft.life--;
    if (ft.life <= 0) floatTexts.splice(i, 1);
  }
}
function drawFloatTexts() {
  for (const ft of floatTexts) {
    const sy = ft.y - cameraY;
    if (sy < -50 || sy > H + 50) continue;

    // 简洁弹出：快速放大到位
    const t = Math.min(1, ft.age / 6);
    const scale = t < 1 ? 0.5 + 0.5 * (1 - Math.pow(1 - t, 3)) : 1;

    // 淡入淡出
    const fadeIn = Math.min(1, ft.age / 3);
    const fadeOut = Math.min(1, ft.life / (ft.ml * 0.3));
    const alpha = fadeIn * fadeOut;

    ctx.save();
    ctx.translate(ft.x, sy);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;

    // 字体设置
    ctx.font = `bold ${ft.size}px "Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;

    // 白色粗描边（消除锯齿 + 提升可读性）
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 4;
    ctx.strokeText(ft.text, 0, 0);

    // 黑色填充文字
    ctx.fillStyle = '#000';
    ctx.fillText(ft.text, 0, 0);

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
function tickParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.04; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/p.ml);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y-cameraY, p.sz, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ============================================================
//  Toast
// ============================================================
function toast(txt){
  const d=document.createElement('div');d.className='toast';d.textContent=txt;
  $wrap.appendChild(d); setTimeout(()=>d.remove(),1800);
}

// ============================================================
//  UPDATE（核心）
// ============================================================
function update() {
  if (state !== 'play') return;
  tick++;
  difficulty = Math.min(1, currentDiffLevel / 15);

  // ---- 输入 ----
  if (keys['ArrowLeft']  || keys['KeyA']) { P.vx -= MOVE_SPD; P.dir = -1; }
  if (keys['ArrowRight'] || keys['KeyD']) { P.vx += MOVE_SPD; P.dir = 1; }
  if (tiltX) { P.vx += tiltX * MOVE_SPD * 1.4; P.dir = tiltX > 0 ? 1 : -1; }

  // 着陆冷却递减
  if (P.landCooldown > 0) P.landCooldown--;

  // 自动跳跃：落地后冷却结束自动起跳（手机版无需点击跳跃）
  if (P.grounded && P.landCooldown <= 0) {
    P.vy = JUMP_VY;
    P.grounded = false;
    playSfx('jump');
    // 如果站在碎裂平台上，跳跃时立即摧毁
    if (P.landedPlat && P.landedPlat.type === 'breakable') {
      P.landedPlat.alive = false;
      emitBurst(P.landedPlat.x, P.landedPlat.y, 10, '#b0d4ff', 3, 28);
    }
    P.landedPlat = null;
    emitBurst(P.x, P.y + P.h/2, 5, '#a0c8ff', 2, 18);
  }

  P.vx *= FRICTION;
  P.vx = Math.max(-MAX_VX, Math.min(MAX_VX, P.vx));

  // ---- 道具持续效果 ----
  if (P.powerUp === 'feihua') {
    P.vy = FEIHUA_VY;
    P.puTimer--;
    if (tick%3===0) {
      emitBurst(P.x+(Math.random()-.5)*16, P.y+P.h/2, 1, '#ffb0d0', 1, 22);
      emitBurst(P.x+(Math.random()-.5)*16, P.y+P.h/2, 1, '#ff90c0', 1, 18);
    }
    if (P.puTimer <= 0) { P.powerUp = null; P.vy = JUMP_VY * .4; hudPower(''); stopFeihuaLoop(); }
  } else {
    // 可变重力曲线
    if (!P.grounded) {
      let gravity;
      if (P.vy < -APEX_THRESHOLD) {
        // 上升阶段 — 轻重力，跳跃更高更飘逸
        gravity = GRAVITY_UP;
      } else if (P.vy < APEX_THRESHOLD) {
        // 跳跃顶点附近 — 极轻重力，滞空感
        gravity = GRAVITY_APEX;
      } else {
        // 下降阶段 — 重重力，快速落地，手感干脆
        gravity = GRAVITY_DOWN;
      }
      P.vy += gravity;
      if (P.vy > MAX_FALL) P.vy = MAX_FALL;
    }
  }

  if (P.shield) { P.shieldTimer--; if (P.shieldTimer<=0){ P.shield=false; hudPower(''); } }
  if (P.trampolineInv > 0) P.trampolineInv--;
  // 受伤无敌计时
  if (P.hurtInv > 0) {
    P.hurtInv--;
    P.hurtFlash = Math.floor(P.hurtInv / 4) % 2 === 0; // 每4帧闪烁一次
    if (P.hurtInv <= 0) P.hurtFlash = false;
  }

  P.x += P.vx;
  P.y += P.vy;

  // 画面边界限制（硬墙，不允许穿越）
  const halfPW = P.w / 2;
  if (P.x < halfPW) { P.x = halfPW; P.vx = 0; }
  if (P.x > W - halfPW) { P.x = W - halfPW; P.vx = 0; }

  // ---- 站立平台跟随 ----
  if (P.grounded && P.landedPlat) {
    const pl = P.landedPlat;
    // 平台已消失/碎裂完毕/休眠/离开画面 → 掉下去
    if (!pl.alive || pl.dormant ||
        (pl.type === 'vanish' && pl.vanishT <= 0) ||
        pl.y > cameraY + H + 30) {
      P.grounded = false;
      P.landedPlat = null;
    }
    // 移动平台 → 跟随 X
    else if (pl.type === 'moving') {
      const newX = pl.ox + Math.sin(tick * .009 * pl.mspd) * pl.mrange;
      P.x += (newX - pl.x); // 差值跟随
      // 跟随后也限制在画面内
      const hpw = P.w / 2;
      if (P.x < hpw) P.x = hpw;
      if (P.x > W - hpw) P.x = W - hpw;
    }
    // 仍在平台上 → 保持 Y 位置
    if (P.grounded && P.landedPlat) {
      P.y = P.landedPlat.y - P.h/2;
      // 检测是否走出平台边缘
      if (P.x + P.w/2 < P.landedPlat.x - P.landedPlat.w/2 - 5 ||
          P.x - P.w/2 > P.landedPlat.x + P.landedPlat.w/2 + 5) {
        P.grounded = false;
        P.landedPlat = null;
      }
    }
  }

  // ---- 平台碰撞（仅下落时） ----
  if (P.vy > 0 && !P.grounded && P.powerUp !== 'feihua') {
    const feetY     = P.y + P.h/2;
    const feetPrevY = feetY - P.vy;  // 上一帧脚底

    for (const pl of platforms) {
      if (!pl.alive || pl.dormant) continue;
      // 画面外的平台不参与碰撞（上方/下方都跳过）
      if (pl.y < cameraY - 60 || pl.y > cameraY + H + 30) continue;

      // 实际 X（moving 平台已在绘制时更新了 pl.x）
      const px = pl.x;
      // 水平重叠
      if (P.x + P.w/2 < px - pl.w/2 || P.x - P.w/2 > px + pl.w/2) continue;
      // 穿越检测
      const platTop = pl.y;
      if (feetPrevY > platTop + 4) continue;  // 上一帧已在平台下方→不触发
      if (feetY < platTop - 2) continue;       // 还没到

      // ---- 命中平台 ----

      // crumble：踩到瞬间碎裂，玩家不停留直接掉落
      if (pl.type === 'crumble') {
        if (pl.crumbleT === 0) {
          pl.crumbleT = 1;  // 开始碎裂动画
          // 生成碎片粒子
          pl.crumbleShards = [];
          for (let s = 0; s < 12; s++) {
            const sz = 2 + Math.floor(Math.random() * 3) * 2; // 2,4,6 像素方块
            pl.crumbleShards.push({
              x: (Math.random() - 0.5) * pl.w * 0.9,
              y: (Math.random() - 0.5) * pl.h,
              vx: (Math.random() - 0.5) * 3.5,
              vy: Math.random() * 2.5 + 0.5,
              rot: Math.random() * 4, // 用作颜色索引
              rotSpd: 0,
              w: sz,
              h: sz,
              alpha: 1,
            });
          }
          playSfx('crumble');
          emitBurst(px, pl.y, 15, '#e8c0a0', 3, 30);
          emitBurst(px, pl.y, 8, '#d4a080', 2, 22);
          emitFloatText(px, pl.y - 15, '碎裂！', '#e8a080', 16);
        }
        // 玩家不停留，继续下落（不 break，也不设 grounded）
        // 只给一个微小弹跳感
        P.vy = Math.min(P.vy, 0.5);
        continue;  // 不 break，让玩家穿过
      }

      // vanish
      if (pl.type === 'vanish' && pl.vanishT === 0) {
        pl.vanishT = 1; // 开始消失动画
      }

      // spring 弹台是特殊的——踩上去直接弹飞（不需要空格）
      if (pl.type === 'spring') {
        P.vy = SPRING_VY;
        pl.springT = 1;
        pl.springSquash = 1;  // Q弹挤压动画开始
        P.grounded = false;
        playSfx('spring');
        emitBurst(px, pl.y, 12, '#ffd700', 3, 25);
        emitBurst(px, pl.y, 6, '#fff8d0', 2, 18);
        P.y = platTop - P.h/2;
        break;
      }

      // 普通/移动/消失平台：着陆停住，等空格跳
      P.vy = 0;
      P.y = platTop - P.h/2;

      // 蹦床判定：踩到带蹦床的平台 → 超级弹跳（不停留）
      if (pl.hasTrampoline) {
        P.vy = SIMING_VY;  // 使用原暖暖之翼的超级弹跳速度
        P.grounded = false;
        P.trampolineInv = 120;  // 蹦床无敌约2秒
        playSfx('trampoline');
        pl.trampolineT = 1;  // 弹跳动画
        emitBurst(px, pl.y - 10, 12, '#ff60a0', 4, 28);
        emitBurst(px, pl.y - 10, 8, '#ffd700', 3, 22);
        emitFloatText(px, pl.y - 25, '弹射！', '#ff60a0', 18);
        toast('🎪 蹦床弹射！');
        break;
      }

      P.grounded = true;
      P.landCooldown = LAND_COOLDOWN;
      P.landedPlat = pl;
      emitBurst(P.x, P.y + P.h/2, 4, '#a0c8ff', 1.5, 15);
      break;
    }
  }

  // ---- 道具碰撞 ----
  for (let i = items.length-1; i >= 0; i--) {
    const it = items[i];
    if (!it.alive) continue;
    if (Math.abs(P.x - it.x) < 22 && Math.abs(P.y - it.y) < 26) {
      it.alive = false;
      pickItem(it);
    }
  }

  // ---- 怪物 ----
  for (let i = monsters.length-1; i >= 0; i--) {
    const m = monsters[i];
    if (!m.alive) continue;
    if (m.type === 'shadow') {
      m.x += m.vx;
      if(m.x<25||m.x>W-25) m.vx*=-1;
      // 动态怪物碰到平台区域时反弹（用较小的运行时间距，避免被两个平台卡死）
      const RUN_GAP_X = 10; // 运行时X方向碰撞余量
      const RUN_GAP_Y = 25; // 运行时Y方向碰撞余量（只检测真正同层的平台）
      for (const p of platforms) {
        if (!p.alive || p.dormant) continue;
        if (Math.abs(m.y - p.y) < (m.h/2 + p.h/2 + RUN_GAP_Y) &&
            Math.abs(m.x - p.x) < (m.w/2 + p.w/2 + RUN_GAP_X)) {
          m.vx *= -1;
          m.x += m.vx * 3; // 弹开一段，防止卡住
          break;
        }
      }
    }
    m.ph += .05;

    if (Math.abs(P.x-m.x)<20 && Math.abs(P.y-m.y)<28) {
      // 飞花无敌：直接击杀敌人 + 得分
      if (P.powerUp === 'feihua') {
        m.alive = false;
        score += 150;
        playSfx('kill');
        emitBurst(m.x, m.y, 18, '#ffb0d0', 5, 35);
        emitBurst(m.x, m.y, 10, '#ff60a0', 3, 25);
        emitFloatText(m.x, m.y - 15, '+150', '#ffb0d0', 22);
        continue;
      }
      // 蹦床无敌：直接击杀敌人 + 得分
      if (P.trampolineInv > 0) {
        m.alive = false;
        score += 120;
        playSfx('kill');
        emitBurst(m.x, m.y, 16, '#ffd700', 5, 32);
        emitBurst(m.x, m.y, 8, '#ff90c0', 3, 24);
        emitFloatText(m.x, m.y - 15, '+120', '#ffd700', 20);
        continue;
      }
      // 受伤无敌期间 → 穿过怪物，不受伤害
      if (P.hurtInv > 0) continue;
      // 踩杀判定（宽松）：
      //   条件1：玩家中心在怪物中心上方（P.y < m.y）即可踩杀
      //   条件2：或者虽然中心略低，但正在下落且脚底不超过怪物中心下方 18px
      //   这样从侧上方接触基本都会判定为踩杀
      const feetY = P.y + P.h / 2;
      const stompOK = (P.y < m.y) || (P.vy > 0 && feetY < m.y + 18);
      if (stompOK) {
        m.alive = false;
        P.vy = JUMP_VY;
        score += 100;
        playSfx('kill');
        emitBurst(m.x, m.y, 15, '#8040a0', 4, 30);
        emitFloatText(m.x, m.y - 15, '+100', '#d080ff', 20);
      } else if (P.shield) {
        m.alive = false;
        emitBurst(m.x, m.y, 10, '#ffd700', 3, 25);
        P.shield = false; P.shieldTimer = 0; hudPower('');
      } else {
        // 扣血 + 受伤无敌闪烁
        P.hp--;
        P.hurtInv = 60;  // 60帧 ≈ 1秒无敌时间
        P.hurtFlash = true;
        playSfx('hurt');
        emitBurst(P.x, P.y, 12, '#ff3366', 3, 25);
        emitFloatText(P.x, P.y - 20, '-1 ♥', '#ff3366', 20);
        // 受伤击退（轻微弹开）
        P.vy = -2.5;
        P.vx += (P.x > m.x ? 2 : -2);
        if (P.hp <= 0) {
          triggerDeath(); return;
        }
      }
    }
  }

  // ---- 镜头（只向上） ----
  const target = P.y - H * 0.50;
  if (target < cameraY) cameraY += (target - cameraY) * 0.12;

  // ---- 分数 ----
  const h = Math.max(0, Math.floor((H - 80 - P.y) / 8));
  if (h > maxHeight) { score += h - maxHeight; maxHeight = h; }

  // ---- 里程碑播报（每500米） ----
  if (maxHeight >= nextMilestone) {
    playSfx('milestone');
    milestoneAnim = {
      text: `抵达海拔${nextMilestone}米处`,
      timer: 120,     // 持续约2秒
      maxTimer: 120,
    };
    nextMilestone += 500;
    // 加分奖励
    score += 200;
  }

  // 里程碑动画倒计时
  if (milestoneAnim) {
    milestoneAnim.timer--;
    if (milestoneAnim.timer <= 0) milestoneAnim = null;
  }

  // ---- 生成 & 清理 ----
  generateUp();
  const bottomClean = cameraY + H + 50;   // 平台离开画面底部50px即销毁，防止画面外残留可踩平台
  platforms = platforms.filter(p => {
    if (p.breakT > 0 || p.crumbleT > 0) return true; // 正在播碎裂动画的保留
    if (p.y >= bottomClean) { p.alive = false; return false; } // 超出画面底部 → 强制销毁
    return true;
  });
  items    = items.filter(it => it.y < bottomClean && it.alive);
  monsters = monsters.filter(m => m.y < bottomClean);

  // ---- 平台动画 ----
  for (const pl of platforms) {
    pl.shimmer += (pl.type === 'crumble' ? .07 : .03);
    if (pl.type === 'moving') {
      let newX = pl.ox + Math.sin(tick * .009 * pl.mspd) * pl.mrange;
      // clamp 到屏幕边界内
      const halfPlatW = pl.w / 2 + 5;
      newX = Math.max(halfPlatW, Math.min(W - halfPlatW, newX));
      pl.x = newX;
    }

    // 休眠状态：倒计时结束后复活
    if (pl.dormant) {
      pl.dormantTimer--;
      if (pl.dormantTimer <= 0) {
        pl.dormant = false;
        pl.alive = true;
        pl.breakT = 0;
        pl.vanishT = 0;
      }
      continue; // 休眠中不做其他动画
    }

    // 消失平台：vanishT 从 1 递减，到 0 时进入休眠
    if (pl.vanishT > 0) {
      pl.vanishT -= .008;
      if (pl.vanishT <= 0) {
        pl.alive = false;
        pl.dormant = true;
        pl.dormantTimer = 120; // 2秒
      }
    }
    if (pl.springT > 0) pl.springT -= .04;
    if (pl.springSquash > 0) pl.springSquash -= .06; // Q弹挤压衰减
    if (pl.trampolineT > 0) pl.trampolineT -= .03;

    // 碎裂平台（crumble）：碎片动画
    if (pl.crumbleT > 0) {
      pl.crumbleT -= .018;  // 约55帧≈0.9秒碎裂动画
      // 更新碎片
      if (pl.crumbleShards) {
        for (const sh of pl.crumbleShards) {
          sh.x += sh.vx;
          sh.y += sh.vy;
          sh.vy += 0.12;  // 重力
          sh.rot += sh.rotSpd;
          sh.alpha = Math.max(0, pl.crumbleT);
        }
      }
      if (pl.crumbleT <= 0) {
        pl.alive = false;
        pl.crumbleShards = null;
        // crumble 不恢复，永久销毁
      }
    }
  }

  // ---- 掉落 ----
  if (P.y > cameraY + H + 60) { endGame(); return; }

  // ---- HUD ----
  $hScore.innerHTML  = '<span class="star-icon">✦</span> ' + score;
  $hHeight.textContent = maxHeight + ' m';
  $hLevel.textContent  = `第${levelSegIndex+1}段 · 难度${currentDiffLevel}`;

  tickParticles();
  tickFloatTexts();
  tickWeather();
  tickWeatherSfx();
}

function pickItem(it) {
  switch(it.type) {
    case 'feihua':
      P.powerUp = 'feihua'; P.puTimer = FEIHUA_DUR;
      toast('🌸 飞花缭绕'); hudPower('飞花');
      playSfx('feihua');
      startFeihuaLoop();  // 启动飞行持续音效
      emitBurst(it.x,it.y,12,'#ffb0d0',3,28);
      emitFloatText(it.x, it.y - 10, '飞花', '#ffb0d0', 16); break;
    case 'shield':
      P.shield = true; P.shieldTimer = SHIELD_DUR;
      toast('✨ 星光护盾'); hudPower('护盾');
      playSfx('shield');
      emitBurst(it.x,it.y,15,'#5ab8ff',4,32);
      emitFloatText(it.x, it.y - 10, '护盾', '#5ab8ff', 16); break;
    case 'star':
      score += 50;
      playSfx('star');
      emitBurst(it.x, it.y, 12, '#ffe066', 3, 24);
      emitBurst(it.x, it.y, 5, '#fff5b0', 2, 18);
      emitFloatText(it.x, it.y - 10, '+50', '#ffe066', 18);
      break;
    case 'heart':
      if (P.hp < P.maxHp) {
        P.hp++;
        playSfx('heart');
        emitBurst(it.x, it.y, 15, '#ffffff', 4, 30);
        emitBurst(it.x, it.y, 8, '#cccccc', 3, 22);
        emitFloatText(it.x, it.y - 10, '+1 ♥', '#ffffff', 20);
        toast('🤍 回复生命！');
      } else {
        // 满血时吃到心心 → 加分
        score += 80;
        emitBurst(it.x, it.y, 10, '#dddddd', 3, 22);
        emitFloatText(it.x, it.y - 10, '+80', '#dddddd', 18);
      }
      break;
  }
}

function hudPower(txt) {
  $hPower.textContent = txt; $hPower.style.opacity = txt ? 1 : 0;
}

// ---- 里程碑播报绘制（简约风格） ----
function drawMilestone() {
  if (!milestoneAnim) return;
  const m = milestoneAnim;
  const progress = 1 - m.timer / m.maxTimer;  // 0→1

  // 淡入→停留→淡出
  let alpha, yOffset;
  if (progress < 0.12) {
    const t = progress / 0.12;
    alpha = t;
    yOffset = (1 - t) * 15;
  } else if (progress < 0.80) {
    alpha = 1;
    yOffset = 0;
  } else {
    const t = (progress - 0.80) / 0.20;
    alpha = 1 - t;
    yOffset = -t * 10;
  }

  const cx = W / 2;
  const cy = H * 0.30 + yOffset;

  ctx.save();
  ctx.globalAlpha = alpha;

  // 简约半透明背景条
  const barW = 180, barH = 36;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(cx - barW/2, cy - barH/2, barW, barH);

  // 主文字（白色，简洁）
  ctx.font = 'bold 18px "Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(m.text, cx, cy - 2);

  // 副文字（+200）
  ctx.font = '12px "Microsoft YaHei",sans-serif';
  ctx.fillStyle = 'rgba(255,215,100,0.8)';
  ctx.fillText('+200', cx, cy + 13);

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawHpBar() {
  if (state !== 'play' && state !== 'dying') return;
  const pixelSize = 3;  // 每个像素块 3x3 px
  const heartW = 9 * pixelSize;   // 27px
  const heartH = 8 * pixelSize;   // 24px
  const gap = 6;  // 爱心之间间距
  const startX = W - 14;  // 右上角
  const startY = 34;

  for (let i = 0; i < P.maxHp; i++) {
    const hx = startX - i * (heartW + gap);
    const hy = startY;
    const filled = i < P.hp;

    ctx.save();
    ctx.translate(hx, hy);

    // 受伤瞬间心跳动画
    if (filled && P.hurtInv > 50) {
      const beatScale = 1 + 0.12 * Math.sin(P.hurtInv * 0.5);
      ctx.translate(heartW/-2, heartH/-2);
      ctx.scale(beatScale, beatScale);
      ctx.translate(heartW/2, heartH/2);
    }

    drawPixelHeart(ctx, -heartW, -heartH/2, pixelSize, filled);

    ctx.restore();
  }
}

function drawPixelHeart(c, ox, oy, px, filled) {
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 9; col++) {
      if (!HEART_PIXELS[row][col]) continue;

      const x = ox + col * px;
      const y = oy + row * px;

      if (filled) {
        // 黑白配色：白色主体，上方亮白→下方浅灰渐变
        const t = row / 7;
        const v = Math.round(255 - t * 50);  // 255→205
        c.fillStyle = `rgb(${v},${v},${v})`;
        c.fillRect(x, y, px, px);

        // 高光像素（左上纯白闪亮点）
        if (HEART_HIGHLIGHT[row][col]) {
          c.fillStyle = 'rgba(255,255,255,0.95)';
          c.fillRect(x, y, px, px);
        }
      } else {
        // 空心：深灰半透明像素
        c.fillStyle = 'rgba(60,60,60,0.4)';
        c.fillRect(x, y, px, px);
        // 暗色描边感
        c.fillStyle = 'rgba(40,40,40,0.2)';
        c.fillRect(x + px - 1, y + px - 1, 1, 1);
      }
    }
  }

  // 像素风描边（黑色外框，每个边缘像素加暗边）
  if (filled) {
    c.fillStyle = 'rgba(0,0,0,0.3)';
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 9; col++) {
        if (!HEART_PIXELS[row][col]) continue;
        const x = ox + col * px;
        const y = oy + row * px;
        // 右边和底边暗角（像素风立体感）
        c.fillRect(x + px - 1, y + 1, 1, px - 1);
        c.fillRect(x + 1, y + px - 1, px - 1, 1);
      }
    }
  }
}

  { top: [8,8,22], mid: [15,15,38], bot: [25,25,50],
