<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>暖暖登峰记 - 手机版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a22;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif;touch-action:none;user-select:none;
  display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}

/* 游戏容器：竖屏手机比例 */
#game-wrap{
  position:relative;
  width:min(100vw, 420px);
  height:100vh;
  max-height:100vh;
  overflow:hidden;
  background:#2a2a35;
  /* 电脑上有圆角和阴影，更像手机 */
  box-shadow:0 0 60px rgba(80,80,100,.25);
}
/* 当屏幕很宽时(电脑)，限制高度让比例接近9:16 */
@media (min-width:500px) {
  #game-wrap{
    height:min(100vh, 780px);
    border-radius:20px;
  }
}
canvas#C{display:block;width:100%;height:100%}

/* ===== 开始界面 ===== */
#ui-start{
  position:absolute;inset:0;z-index:100;
  border-radius:inherit;overflow:hidden;
}
.start-deco-top{
  font-size:11px;letter-spacing:4px;color:rgba(255,210,240,.45);
  margin-bottom:16px;animation:decoFloat 3s ease-in-out infinite;
  text-shadow:0 0 12px rgba(255,180,220,.2);
}
@keyframes decoFloat{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(-4px);opacity:.65}}
.start-tagline{
  font-size:12px;letter-spacing:3px;color:rgba(255,200,220,.55);
  margin:4px 0 24px;text-shadow:0 1px 6px rgba(0,0,0,.3);
}
.t-main{font-size:clamp(28px,8vw,48px);font-weight:900;letter-spacing:6px;
  background:linear-gradient(135deg,#ffd0e8,#fff,#ffc0d8,#ffe0f0);background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 4s ease infinite;
  text-shadow:none;filter:drop-shadow(0 2px 10px rgba(0,0,0,.3))}
.t-sub{font-size:13px;color:rgba(200,200,220,.6);letter-spacing:8px;margin:6px 0 28px;text-shadow:0 1px 4px rgba(0,0,0,.3)}
@keyframes shine{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.preview-char{width:100px;height:130px;position:relative;margin-bottom:20px;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.btn{padding:13px 44px;font-size:18px;font-weight:700;color:#fff;border:none;border-radius:50px;
  cursor:pointer;letter-spacing:4px;transition:all .3s;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#ff80b0,#cc7acc);
  box-shadow:0 4px 25px rgba(255,128,176,.4);
  touch-action:manipulation;z-index:100;-webkit-tap-highlight-color:rgba(0,0,0,0)}
.btn:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 8px 35px rgba(255,128,176,.6)}
.hint{margin-top:18px;color:rgba(200,200,220,.5);font-size:11px;letter-spacing:1.5px;text-align:center;line-height:1.6;text-shadow:0 1px 3px rgba(0,0,0,.2)}

/* ===== 游戏 HUD ===== */
#ui-hud{position:absolute;top:0;left:0;right:0;padding:10px 14px;z-index:50;display:none;
  justify-content:space-between;align-items:flex-start;pointer-events:none;
  background:linear-gradient(180deg,rgba(25,25,35,.65) 0%,transparent 100%)}
.hud-score{font-size:24px;font-weight:800;color:#e0e0f0;text-shadow:0 0 12px rgba(0,0,0,.4)}
.star-icon{color:#ffe066;text-shadow:0 0 8px rgba(255,224,102,.7),0 0 16px rgba(255,200,60,.3);
  font-size:inherit;vertical-align:baseline;animation:starGlow 2s ease-in-out infinite}
@keyframes starGlow{0%,100%{text-shadow:0 0 8px rgba(255,224,102,.7),0 0 16px rgba(255,200,60,.3);opacity:1}
  50%{text-shadow:0 0 14px rgba(255,224,102,.95),0 0 28px rgba(255,200,60,.5);opacity:.92}}
.hud-height{font-size:11px;color:rgba(200,200,220,.65);margin-top:2px}
.hud-power{font-size:12px;color:#ffd700;margin-top:4px;opacity:0;transition:opacity .3s}
.hud-level{font-size:11px;color:rgba(200,200,220,.55);margin-top:3px;letter-spacing:1px}

/* ===== 结算界面 ===== */
#ui-over{position:absolute;inset:0;z-index:100;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:inherit;transition:background .5s}
.ov-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);border-radius:inherit}
.ov-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.ov-scene-tag{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.45);margin-bottom:10px;font-weight:500}
.ov-height-big{font-size:52px;font-weight:900;color:#fff;line-height:1;
  text-shadow:0 2px 20px rgba(0,0,0,.4)}
.ov-height-unit{font-size:16px;font-weight:600;color:rgba(255,255,255,.5);margin-left:4px}
.ov-divider{width:40px;height:2px;background:rgba(255,255,255,.15);margin:16px 0;border-radius:1px}
.ov-score-line{font-size:14px;color:rgba(255,255,255,.6);font-weight:500;margin-bottom:4px}
.ov-score-line .star-icon{color:#ffd066}
.ov-best-line{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:2px}
.new-record{display:inline-block;padding:2px 8px;font-size:10px;font-weight:800;
  color:#fff;background:linear-gradient(135deg,#ff5c8a,#ff8a3d);border-radius:10px;
  box-shadow:0 2px 10px rgba(255,92,138,.5);letter-spacing:1px;margin-left:6px;
  animation:nrPulse 1s ease-in-out infinite}
@keyframes nrPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.btn-re{padding:11px 40px;font-size:15px;font-weight:600;color:rgba(255,255,255,.85);
  border:1px solid rgba(255,255,255,.2);border-radius:50px;cursor:pointer;
  background:rgba(255,255,255,.08);letter-spacing:4px;margin-top:24px;transition:all .3s;
  backdrop-filter:blur(4px);touch-action:manipulation;z-index:100;-webkit-tap-highlight-color:rgba(0,0,0,0)}
.btn-re:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35);
  box-shadow:0 4px 20px rgba(0,0,0,.3)}

/* ===== 路线图 ===== */
.route-map{position:relative;width:220px;margin:18px auto 0;padding:6px 0}
.route-track{position:absolute;left:18px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.12);border-radius:1px}
.route-progress{position:absolute;left:18px;bottom:0;width:2px;border-radius:1px;
  background:linear-gradient(to top,rgba(255,180,80,.7),rgba(255,220,120,.9));transition:height .8s ease}
.route-node{position:relative;display:flex;align-items:center;height:22px;margin-bottom:1px}
.route-dot{position:absolute;left:14px;width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.15);z-index:2;
  transition:all .4s ease;flex-shrink:0}
.route-dot.reached{background:rgba(255,200,80,.65);border-color:rgba(255,220,120,.7);
  box-shadow:0 0 6px rgba(255,200,80,.4)}
.route-dot.current{background:#ffd060;border-color:#ffe090;
  box-shadow:0 0 10px rgba(255,210,80,.7),0 0 20px rgba(255,210,80,.3);
  animation:dotPulse 1.5s ease-in-out infinite}
@keyframes dotPulse{0%,100%{transform:scale(1);box-shadow:0 0 10px rgba(255,210,80,.7)}
  50%{transform:scale(1.3);box-shadow:0 0 16px rgba(255,210,80,.9),0 0 30px rgba(255,210,80,.4)}}
.route-label{margin-left:34px;font-size:9.5px;color:rgba(255,255,255,.25);
  letter-spacing:.5px;white-space:nowrap;transition:all .4s ease}
.route-label.reached{color:rgba(255,255,255,.55)}
.route-label.current{color:rgba(255,230,160,.9);font-weight:700;font-size:10.5px;
  text-shadow:0 0 8px rgba(255,210,80,.4)}
.route-height{position:absolute;right:0;font-size:8px;color:rgba(255,255,255,.18);
  font-weight:500;letter-spacing:.3px}
.route-height.reached{color:rgba(255,255,255,.35)}
.route-player-marker{position:absolute;left:6px;width:26px;height:26px;z-index:3;
  transition:bottom .8s ease;pointer-events:none}
.route-player-marker::after{content:'▶';position:absolute;left:0;top:50%;
  transform:translateY(-50%);font-size:9px;color:#ffd060;
  text-shadow:0 0 6px rgba(255,210,80,.8);animation:markerBlink 1.2s ease-in-out infinite}
@keyframes markerBlink{0%,100%{opacity:1}50%{opacity:.5}}

/* toast - 相对游戏容器定位 */
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);padding:5px 16px;
  border-radius:18px;background:rgba(40,40,55,.55);border:1px solid rgba(120,120,150,.35);
  color:#d0d0e8;font-size:14px;font-weight:600;z-index:60;pointer-events:none;white-space:nowrap;
  text-shadow:0 1px 3px rgba(0,0,0,.3);backdrop-filter:blur(6px);
  animation:tin .25s ease,tout .3s ease 1.4s forwards}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-16px)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(-16px)}}

/* 开始界面雾气 */
.star{position:absolute;border-radius:50%;background:rgba(160,160,180,.18);
  animation:tw var(--d) ease-in-out infinite;filter:blur(2px)}
@keyframes tw{0%,100%{opacity:.12;transform:scale(.8) translateX(0)}50%{opacity:.35;transform:scale(1.1) translateX(4px)}}
</style>
</head>
<body>

<!-- 游戏容器：竖屏手机比例 -->
<div id="game-wrap">

<!-- 开始界面 -->
<div id="ui-start">
  <canvas id="startBg" style="position:absolute;inset:0;width:100%;height:100%;border-radius:inherit"></canvas>
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%">
    <div class="start-deco-top">✦ 向着星空攀登吧 ✦</div>
    <canvas class="preview-char" id="previewChar" width="100" height="130"></canvas>
    <div class="t-main">暖暖登峰记</div>
    <div class="t-sub">NIKKI SUMMIT QUEST</div>
    <div class="start-tagline">从山脚到极顶 · 跨越万米云海</div>
    <button class="btn" id="btnStart">开始冒险</button>
    <div class="hint">自动跳跃 · 左右半屏控制方向<br>按住屏幕左侧←  按住屏幕右侧→</div>
  </div>
</div>

<!-- 游戏画布 -->
<canvas id="C"></canvas>

<!-- HUD -->
<div id="ui-hud">
  <div>
    <div class="hud-score" id="hScore"><span class="star-icon">✦</span> Score: 0</div>
    <div class="hud-height" id="hHeight">0 m</div>
    <div class="hud-power" id="hPower"></div>
    <div class="hud-level" id="hLevel">第1段</div>
  </div>
</div>

<!-- 结算 -->
<div id="ui-over">
  <div class="ov-overlay"></div>
  <div class="ov-content">
    <div class="ov-scene-tag" id="oScene">阴天山脚</div>
    <div><span class="ov-height-big" id="oHeight">0</span><span class="ov-height-unit">m</span></div>
    <div class="ov-best-line" id="oHeightBest"></div>
    <div class="ov-divider"></div>
    <div class="ov-score-line"><span class="star-icon">✦</span> <span id="oScore">0</span></div>
    <div class="ov-best-line" id="oScoreBest"></div>
    <div id="recordBadge"></div>
    <div class="route-map" id="routeMap"></div>
    <button class="btn-re" id="btnRe">再次出发</button>
  </div>
</div>

</div><!-- /game-wrap -->

<script>
// ============================================================
//  暖暖登峰记  —  Nikki Summit Quest
//  基于涂鸦跳跃执行案，角色：无限暖暖
// ============================================================

(() => {
"use strict";

// ---- DOM ----
const $wrap    = document.getElementById('game-wrap');
const $canvas  = document.getElementById('C');
const ctx      = $canvas.getContext('2d');
const $start   = document.getElementById('ui-start');
const $hud     = document.getElementById('ui-hud');
const $over    = document.getElementById('ui-over');
const $hScore  = document.getElementById('hScore');
const $hHeight = document.getElementById('hHeight');
const $hPower  = document.getElementById('hPower');
const $hLevel  = document.getElementById('hLevel');
const $oScore  = document.getElementById('oScore');
const $oHeight = document.getElementById('oHeight');
const $oScoreBest  = document.getElementById('oScoreBest');
const $oHeightBest = document.getElementById('oHeightBest');
const $oScene  = document.getElementById('oScene');
const $recordBadge = document.getElementById('recordBadge');
const $routeMap = document.getElementById('routeMap');

// ---- 音频系统（Web Audio API 合成） ----
let audioCtx = null;
let bgmGain = null;
let sfxGain = null;
let bgmPlaying = false;
let bgmIntervalId = null;
// 飞花飞行持续音效
let feihuaSfx = null; // { nodes: [...], stopFn }

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // 主音量控制
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0.18;  // BGM 音量
  bgmGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.35;  // 音效音量
  sfxGain.connect(audioCtx.destination);
}

// --- 合成音效 ---
function playSfx(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(sfxGain);

  switch(type) {
    case 'jump': {
      // 轻快的上升音
      osc.type = 'sine';
      osc.frequency.setValueAtTime(380, now);
      osc.frequency.linearRampToValueAtTime(580, now + 0.1);
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      break;
    }
    case 'spring': {
      // 弹簧音（更高更长）
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(900, now + 0.2);
      gain.gain.setValueAtTime(0.45, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
      break;
    }
    case 'trampoline': {
      // 超级弹射音
      osc.type = 'square';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
      osc.start(now); osc.stop(now + 0.35);
      break;
    }
    case 'star': {
      // 叮~ 拾取星星
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.setValueAtTime(1000, now + 0.06);
      osc.frequency.setValueAtTime(1200, now + 0.12);
      gain.gain.setValueAtTime(0.35, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
    }
    case 'heart': {
      // 柔和暖音（回血）
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.linearRampToValueAtTime(660, now + 0.08);
      osc.frequency.linearRampToValueAtTime(780, now + 0.16);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
      break;
    }
    case 'shield': {
      // 金属质感护盾音
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.linearRampToValueAtTime(600, now + 0.1);
      osc.frequency.linearRampToValueAtTime(500, now + 0.2);
      gain.gain.setValueAtTime(0.35, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      // 叠加一层高频泛音
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.connect(g2); g2.connect(sfxGain);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(800, now);
      osc2.frequency.linearRampToValueAtTime(1000, now + 0.15);
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc2.start(now); osc2.stop(now + 0.25);
      break;
    }
    case 'feihua': {
      // 柔美飘逸音（飞花）
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.linearRampToValueAtTime(800, now + 0.12);
      osc.frequency.linearRampToValueAtTime(700, now + 0.25);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
      osc.start(now); osc.stop(now + 0.35);
      break;
    }
    case 'hurt': {
      // 受伤音（低沉的嗡嗡）
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.linearRampToValueAtTime(100, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
      break;
    }
    case 'kill': {
      // 击杀怪物音
      osc.type = 'square';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.linearRampToValueAtTime(500, now + 0.08);
      osc.frequency.linearRampToValueAtTime(200, now + 0.15);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
    }
    case 'milestone': {
      // 里程碑达成音（上升琶音）
      gain.gain.setValueAtTime(0, now); // 不用第一个osc
      osc.start(now); osc.stop(now + 0.01);
      const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(sfxGain);
        o.type = 'sine';
        o.frequency.value = freq;
        const t = now + i * 0.1;
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        o.start(t); o.stop(t + 0.25);
      });
      break;
    }
    case 'crumble': {
      // 碎裂音 — 短促的碎裂嘎吱声
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(350, now);
      osc.frequency.linearRampToValueAtTime(150, now + 0.1);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      // 叠加碎石噪声感
      const nOsc = audioCtx.createOscillator();
      const nGain = audioCtx.createGain();
      nOsc.connect(nGain); nGain.connect(sfxGain);
      nOsc.type = 'square';
      nOsc.frequency.setValueAtTime(180, now);
      nOsc.frequency.linearRampToValueAtTime(80, now + 0.12);
      nGain.gain.setValueAtTime(0.15, now);
      nGain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
      nOsc.start(now); nOsc.stop(now + 0.18);
      break;
    }
    case 'death': {
      // 死亡音（下降音）
      osc.type = 'sine';
      osc.frequency.setValueAtTime(500, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
      gain.gain.setValueAtTime(0.35, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      osc.start(now); osc.stop(now + 0.6);
      break;
    }
    default: {
      gain.gain.setValueAtTime(0, now);
      osc.start(now); osc.stop(now + 0.01);
    }
  }
}

// --- 飞花飞行音效（风铃摇晃一下，无尾音） ---
function startFeihuaLoop() {
  if (!audioCtx) return;
  stopFeihuaLoop(); // 防止叠加

  const now = audioCtx.currentTime;
  const masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.35, now);
  masterGain.connect(sfxGain);

  // 风铃摇晃：快速清脆的叮叮声，自然衰减后结束
  const chimeNotes = [
    { freq: 1760, time: 0.00, dur: 0.25 },   // A6  — 第一声叮
    { freq: 2093, time: 0.07, dur: 0.22 },   // C7  — 紧接第二声
    { freq: 1568, time: 0.13, dur: 0.28 },   // G6  — 回弹
    { freq: 2349, time: 0.20, dur: 0.20 },   // D7  — 最高点
    { freq: 1760, time: 0.28, dur: 0.30 },   // A6  — 回荡
    { freq: 2093, time: 0.38, dur: 0.35 },   // C7  — 最后一晃
    { freq: 1568, time: 0.48, dur: 0.40 },   // G6  — 渐弱收尾
  ];

  chimeNotes.forEach(n => {
    // 主音：三角波，清脆的金属质感
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(masterGain);
    o.type = 'triangle';
    o.frequency.value = n.freq;
    const t = now + n.time;
    const vol = 0.35 - n.time * 0.2; // 逐渐减弱（自然的摇晃衰减）
    g.gain.setValueAtTime(Math.max(vol, 0.12), t);
    g.gain.exponentialRampToValueAtTime(0.01, t + n.dur);
    o.start(t); o.stop(t + n.dur + 0.02);

    // 高泛音：正弦波高两个八度，极轻的"叮"
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o2.connect(g2); g2.connect(masterGain);
    o2.type = 'sine';
    o2.frequency.value = n.freq * 2;
    g2.gain.setValueAtTime(Math.max(vol * 0.3, 0.04), t);
    g2.gain.exponentialRampToValueAtTime(0.01, t + n.dur * 0.6);
    o2.start(t); o2.stop(t + n.dur * 0.7);
  });

  // 风铃声约0.9秒后自然结束，自动断开
  feihuaSfx = {
    masterGain,
    stop: () => {
      const t = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(t);
      masterGain.gain.setValueAtTime(masterGain.gain.value, t);
      masterGain.gain.linearRampToValueAtTime(0, t + 0.3);
      setTimeout(() => {
        try { masterGain.disconnect(); } catch(e){}
      }, 400);
    }
  };

  // 风铃声播完后自动清理（最后一个音在0.48+0.40=0.88秒结束）
  setTimeout(() => {
    if (feihuaSfx && feihuaSfx.masterGain === masterGain) {
      try { masterGain.disconnect(); } catch(e){}
      feihuaSfx = null;
    }
  }, 1000);
}

function stopFeihuaLoop() {
  if (feihuaSfx) {
    feihuaSfx.stop();
    feihuaSfx = null;
  }
}

// =============== 天气环境音效系统（独立于BGM） ===============
// 根据海拔阶段播放对应的环境声，阶段切换时交叉淡入淡出
let weatherSfx = {
  currentStage: -1,
  nodes: [],       // 当前播放的音源
  masterGain: null,
  noiseNode: null,  // 噪声源（共用）
  noiseBuffer: null,
};

// 生成白噪声 buffer（用于风声、雨声基底）
function getNoiseBuffer() {
  if (weatherSfx.noiseBuffer) return weatherSfx.noiseBuffer;
  const len = audioCtx.sampleRate * 2; // 2秒循环
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  weatherSfx.noiseBuffer = buf;
  return buf;
}

// 创建循环噪声源
function createNoiseSource() {
  const src = audioCtx.createBufferSource();
  src.buffer = getNoiseBuffer();
  src.loop = true;
  return src;
}

// 停止当前环境音
function stopWeatherSfx() {
  const ws = weatherSfx;
  if (ws.masterGain) {
    const t = audioCtx.currentTime;
    ws.masterGain.gain.cancelScheduledValues(t);
    ws.masterGain.gain.setValueAtTime(ws.masterGain.gain.value, t);
    ws.masterGain.gain.linearRampToValueAtTime(0, t + 1.5);
    const oldNodes = ws.nodes.slice();
    const oldMaster = ws.masterGain;
    setTimeout(() => {
      oldNodes.forEach(n => { try { n.stop(); } catch(e){} });
      try { oldMaster.disconnect(); } catch(e){}
    }, 1700);
  }
  ws.nodes = [];
  ws.masterGain = null;
  ws.currentStage = -1;
}

// 根据阶段创建环境音
function startWeatherSfxForStage(stage) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, now);
  master.connect(sfxGain);

  const nodes = [];
  let targetVol = 0;

  switch (stage) {
    case 0: // 阴天山脚 — 无环境音
      targetVol = 0;
      break;

    case 1: { // 花海山坡 — 柔和微风
      const noise = createNoiseSource();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 600; bp.Q.value = 0.5;
      const g = audioCtx.createGain(); g.gain.value = 0.6;
      noise.connect(bp); bp.connect(g); g.connect(master);
      noise.start(now); nodes.push(noise);
      targetVol = 0.06;
      break;
    }

    case 2: { // 雨林峡谷 — 小雨淅沥
      // 雨声：高频滤波噪声
      const rain = createNoiseSource();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 3000;
      const rg = audioCtx.createGain(); rg.gain.value = 0.5;
      rain.connect(hp); hp.connect(rg); rg.connect(master);
      rain.start(now); nodes.push(rain);
      // 低频风声衬底
      const wind = createNoiseSource();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 0.8;
      const wg = audioCtx.createGain(); wg.gain.value = 0.3;
      wind.connect(bp); bp.connect(wg); wg.connect(master);
      wind.start(now); nodes.push(wind);
      targetVol = 0.10;
      break;
    }

    case 3: { // 雷雨悬崖 — 暴雨 + 随机雷声
      // 密集雨声
      const rain = createNoiseSource();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 2500;
      const rg = audioCtx.createGain(); rg.gain.value = 0.7;
      rain.connect(hp); hp.connect(rg); rg.connect(master);
      rain.start(now); nodes.push(rain);
      // 风声
      const wind = createNoiseSource();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 300; bp.Q.value = 0.6;
      const wg = audioCtx.createGain(); wg.gain.value = 0.5;
      wind.connect(bp); bp.connect(wg); wg.connect(master);
      wind.start(now); nodes.push(wind);
      targetVol = 0.14;

      // 随机雷声：用低频振荡器模拟隆隆声
      let thunderActive = true;
      function scheduleThunder() {
        if (!thunderActive || !audioCtx) return;
        const delay = 3000 + Math.random() * 6000; // 3~9秒间隔
        setTimeout(() => {
          if (!thunderActive || !audioCtx) return;
          const t = audioCtx.currentTime;
          // 雷声 = 低频噪声爆发
          const tb = createNoiseSource();
          const lp = audioCtx.createBiquadFilter();
          lp.type = 'lowpass'; lp.frequency.value = 150;
          const tg = audioCtx.createGain();
          tg.gain.setValueAtTime(0, t);
          tg.gain.linearRampToValueAtTime(0.6, t + 0.05);
          tg.gain.exponentialRampToValueAtTime(0.15, t + 0.4);
          tg.gain.linearRampToValueAtTime(0, t + 1.8);
          tb.connect(lp); lp.connect(tg); tg.connect(master);
          tb.start(t); tb.stop(t + 2.0);
          // 叠加中频隆隆
          const tb2 = createNoiseSource();
          const bp2 = audioCtx.createBiquadFilter();
          bp2.type = 'bandpass'; bp2.frequency.value = 80; bp2.Q.value = 1.5;
          const tg2 = audioCtx.createGain();
          tg2.gain.setValueAtTime(0, t);
          tg2.gain.linearRampToValueAtTime(0.35, t + 0.08);
          tg2.gain.exponentialRampToValueAtTime(0.05, t + 0.8);
          tg2.gain.linearRampToValueAtTime(0, t + 2.2);
          tb2.connect(bp2); bp2.connect(tg2); tg2.connect(master);
          tb2.start(t); tb2.stop(t + 2.5);
          scheduleThunder();
        }, delay);
      }
      scheduleThunder();
      // 用闭包保存 thunderActive 的控制
      nodes._stopThunder = () => { thunderActive = false; };
      break;
    }

    case 4: { // 云海栈道 — 呼啸风声
      const wind = createNoiseSource();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.4;
      const wg = audioCtx.createGain(); wg.gain.value = 0.7;
      wind.connect(bp); bp.connect(wg); wg.connect(master);
      wind.start(now); nodes.push(wind);
      // 高频呼啸
      const hi = createNoiseSource();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'bandpass'; hp.frequency.value = 2000; hp.Q.value = 2;
      const hg = audioCtx.createGain(); hg.gain.value = 0.15;
      // LFO调制呼啸的音量起伏
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.3;
      lfoG.gain.value = 0.08;
      lfo.connect(lfoG); lfoG.connect(hg.gain);
      hi.connect(hp); hp.connect(hg); hg.connect(master);
      hi.start(now); lfo.start(now);
      nodes.push(hi, lfo);
      targetVol = 0.10;
      break;
    }

    case 5: { // 夕阳岩壁 — 温暖轻风
      const wind = createNoiseSource();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 700; bp.Q.value = 0.3;
      const wg = audioCtx.createGain(); wg.gain.value = 0.5;
      wind.connect(bp); bp.connect(wg); wg.connect(master);
      wind.start(now); nodes.push(wind);
      targetVol = 0.05;
      break;
    }

    case 6: { // 星空山脊 — 安静夜风 + 偶尔的微弱风啸
      const wind = createNoiseSource();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 0.5;
      const wg = audioCtx.createGain(); wg.gain.value = 0.4;
      wind.connect(bp); bp.connect(wg); wg.connect(master);
      wind.start(now); nodes.push(wind);
      targetVol = 0.04;
      break;
    }

    case 7: { // 雪线冰原 — 雪风
      const wind = createNoiseSource();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.5;
      const wg = audioCtx.createGain(); wg.gain.value = 0.6;
      wind.connect(bp); bp.connect(wg); wg.connect(master);
      wind.start(now); nodes.push(wind);
      // 高频呼啸 — 雪粒刮过
      const hi = createNoiseSource();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 4000;
      const hg = audioCtx.createGain(); hg.gain.value = 0.12;
      hi.connect(hp); hp.connect(hg); hg.connect(master);
      hi.start(now); nodes.push(hi);
      targetVol = 0.09;
      break;
    }

    case 8: { // 暴风雪峰 — 狂风暴雪
      const wind = createNoiseSource();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 0.3;
      const wg = audioCtx.createGain(); wg.gain.value = 0.8;
      wind.connect(bp); bp.connect(wg); wg.connect(master);
      wind.start(now); nodes.push(wind);
      // 更强的高频呼啸
      const hi = createNoiseSource();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'bandpass'; hp.frequency.value = 2500; hp.Q.value = 1.5;
      const hg = audioCtx.createGain(); hg.gain.value = 0.25;
      // LFO让风声有忽大忽小的感觉
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.5;
      lfoG.gain.value = 0.12;
      lfo.connect(lfoG); lfoG.connect(hg.gain);
      hi.connect(hp); hp.connect(hg); hg.connect(master);
      hi.start(now); lfo.start(now);
      nodes.push(hi, lfo);
      targetVol = 0.14;
      break;
    }

    case 9: { // 极顶之巅 — 空灵高频风 + 极微弱的嗡鸣
      const wind = createNoiseSource();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 3000;
      const wg = audioCtx.createGain(); wg.gain.value = 0.3;
      wind.connect(hp); hp.connect(wg); wg.connect(master);
      wind.start(now); nodes.push(wind);
      // 空灵嗡鸣 — 极高正弦波微弱震颤
      const hum = audioCtx.createOscillator();
      const humG = audioCtx.createGain();
      hum.type = 'sine'; hum.frequency.value = 3520; // A7
      humG.gain.value = 0.02;
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 1.5;
      lfoG.gain.value = 0.015;
      lfo.connect(lfoG); lfoG.connect(humG.gain);
      hum.connect(humG); humG.connect(master);
      hum.start(now); lfo.start(now);
      nodes.push(hum, lfo);
      targetVol = 0.06;
      break;
    }
  }

  // 2秒渐入
  master.gain.linearRampToValueAtTime(targetVol, now + 2.0);

  weatherSfx.masterGain = master;
  weatherSfx.nodes = nodes;
  weatherSfx.currentStage = stage;
}

// 每帧调用：检测阶段变化，切换环境音
function tickWeatherSfx() {
  if (!audioCtx) return;
  const stage = getBgStage();
  if (stage !== weatherSfx.currentStage) {
    // 停掉旧环境音（含雷声定时器）
    if (weatherSfx.nodes._stopThunder) weatherSfx.nodes._stopThunder();
    stopWeatherSfx();
    // 启动新阶段环境音
    if (stage > 0) { // 阶段0无环境音
      startWeatherSfxForStage(stage);
    }
  }
}

// --- BGM 合成（悠扬优雅登山旋律） ---
function startBGM() {
  if (!audioCtx || bgmPlaying) return;
  bgmPlaying = true;

  // D大调 — 明朗温暖、愉快攀登感
  // [频率, 持续时间(拍)] — 0 = 休止符
  const melody = [
    // A段 — 晨光出发，轻快上行
    [294,1],[330,1],[370,1],[440,2],[494,1],[440,1],[0,1],   // D E F# A-- B A
    [370,1],[440,1],[494,1],[587,3],[0,1],                    // F# A B D---
    [523,1],[494,1],[440,1],[370,2],[330,1],[294,1],[0,1],   // C# B A F#-- E D
    [330,1.5],[370,1.5],[440,2],[0,1],[0,1],[0,1],           // E- F#- A--  (呼吸)

    // B段 — 登高远望，悠扬舒展
    [440,2],[494,1],[587,1],[659,3],[0,1],                    // A B D E---
    [587,2],[523,1],[494,1],[440,2],[0,2],                    // D C# B A-- (远眺)
    [494,1],[523,1],[587,1],[659,1],[740,2],[659,1],[587,1], // B C# D E F#-- E D
    [494,2],[440,1],[370,1],[294,2],[0,2],                    // B A F# D-- (回归)

    // C段 — 轻盈跳跃，愉快节奏
    [587,1],[0,.5],[587,1],[659,1],[740,1.5],[659,1],[587,1],[0,1], // D·D E F#- E D
    [494,1],[523,1],[587,2],[440,2],[0,1],[0,1],              // B C# D-- A-- (舒缓)
    [370,1],[440,1],[494,1],[587,1],[659,2],[587,1],[0,1],   // F# A B D E-- D
    [494,1.5],[440,1.5],[370,2],[294,2],[0,2],                // B- A- F#-- D-- (句号)

    // D段 — 云端漫步，梦幻柔和
    [587,2],[659,1],[740,1],[880,3],[0,1],                    // D E F# A'---
    [740,1.5],[659,1.5],[587,2],[494,2],[0,1],[0,1],         // F#- E- D-- B--
    [440,1],[494,1],[587,2],[659,1],[587,1],[494,1],[440,1], // A B D-- E D B A
    [370,2],[330,1],[294,1],[330,1],[370,1],[440,3],[0,1],   // F#-- E D E F# A---
  ];

  // D大调和弦进行 — 温暖明朗（每4拍换一组）
  const chords = [
    // A段
    [147, 185, 220],  // D  (低八度)
    [165, 208, 247],  // E  → A的过渡
    [185, 220, 277],  // F#m
    [147, 185, 220],  // D
    // B段
    [220, 277, 330],  // A  (属和弦，明亮)
    [185, 220, 277],  // F#m
    [165, 208, 247],  // Em (柔和过渡)
    [147, 185, 220],  // D
    // C段
    [185, 220, 277],  // F#m (跳跃感)
    [165, 208, 247],  // Em
    [147, 185, 220],  // D
    [220, 277, 330],  // A
    // D段
    [147, 185, 220],  // D  (梦幻回归)
    [165, 208, 247],  // Em
    [185, 220, 277],  // F#m
    [147, 185, 220],  // D  → 循环
  ];

  const bpm = 108;  // 轻快步伐感
  const beatLen = 60 / bpm;
  let noteIndex = 0;
  let chordIndex = 0;
  let beatInChord = 0;
  let arpBeat = 0;  // 琶音节拍计数

  function playNextNote() {
    if (!bgmPlaying || !audioCtx) return;

    const [freq, dur] = melody[noteIndex % melody.length];
    const now = audioCtx.currentTime;
    const duration = dur * beatLen;

    if (freq > 0) {
      // 主旋律（三角波 — 柔和温暖如竖琴）
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.connect(g); g.connect(bgmGain);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.20, now + 0.06);
      g.gain.setValueAtTime(0.20, now + duration * 0.5);
      g.gain.exponentialRampToValueAtTime(0.01, now + duration * 0.92);
      osc.start(now); osc.stop(now + duration);

      // 高八度泛音点缀（轻盈晶莹感）
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.connect(g2); g2.connect(bgmGain);
      osc2.type = 'sine';
      osc2.frequency.value = freq * 2;
      g2.gain.setValueAtTime(0, now);
      g2.gain.linearRampToValueAtTime(0.05, now + 0.08);
      g2.gain.exponentialRampToValueAtTime(0.01, now + duration * 0.6);
      osc2.start(now); osc2.stop(now + duration);

      // 低五度柔和衬托（厚度感，音量很低）
      if (dur >= 2) {
        const osc3 = audioCtx.createOscillator();
        const g3 = audioCtx.createGain();
        osc3.connect(g3); g3.connect(bgmGain);
        osc3.type = 'sine';
        osc3.frequency.value = freq * 0.667;  // 低五度
        g3.gain.setValueAtTime(0, now);
        g3.gain.linearRampToValueAtTime(0.03, now + 0.12);
        g3.gain.exponentialRampToValueAtTime(0.01, now + duration * 0.8);
        osc3.start(now); osc3.stop(now + duration);
      }
    }

    // 每4拍播放伴奏铺底 + 琶音
    const chord = chords[chordIndex % chords.length];
    if (beatInChord === 0) {
      // 柔和pad铺底（正弦波长音）
      chord.forEach(cf => {
        const co = audioCtx.createOscillator();
        const cg = audioCtx.createGain();
        co.connect(cg); cg.connect(bgmGain);
        co.type = 'sine';
        co.frequency.value = cf * 0.5;  // 低八度
        cg.gain.setValueAtTime(0, now);
        cg.gain.linearRampToValueAtTime(0.04, now + 0.2);
        cg.gain.setValueAtTime(0.04, now + beatLen * 3);
        cg.gain.exponentialRampToValueAtTime(0.01, now + beatLen * 3.9);
        co.start(now); co.stop(now + beatLen * 4);
      });
    }

    // 琶音层 — 每拍弹一个和弦音（模拟竖琴/吉他拨弦）
    const arpNote = chord[arpBeat % chord.length];
    if (arpNote) {
      const ao = audioCtx.createOscillator();
      const ag = audioCtx.createGain();
      ao.connect(ag); ag.connect(bgmGain);
      ao.type = 'triangle';
      ao.frequency.value = arpNote * 2;  // 高八度琶音
      ag.gain.setValueAtTime(0, now);
      ag.gain.linearRampToValueAtTime(0.07, now + 0.02);
      ag.gain.exponentialRampToValueAtTime(0.01, now + beatLen * 0.7);
      ao.start(now); ao.stop(now + beatLen * 0.8);
    }
    arpBeat++;

    beatInChord += dur;
    if (beatInChord >= 4) {
      beatInChord -= 4;
      chordIndex++;
    }

    noteIndex++;
    bgmIntervalId = setTimeout(playNextNote, duration * 1000);
  }

  playNextNote();
}

function stopBGM() {
  bgmPlaying = false;
  if (bgmIntervalId) {
    clearTimeout(bgmIntervalId);
    bgmIntervalId = null;
  }
}

// ---- 屏幕（跟随容器尺寸） ----
let W, H;
function resize() {
  const rect = $wrap.getBoundingClientRect();
  W = $canvas.width  = Math.floor(rect.width);
  H = $canvas.height = Math.floor(rect.height);
}
window.addEventListener('resize', resize);

let segPlatRemain = 0;       // 当前段剩余平台数
let currentDiffLevel = 1;    // 当前难度等级

function getLevelDiff(segIdx) {
  // 每段难度+1：第0段=1, 第1段=2, ... 第14段=15, 之后永远=15
  return Math.min(segIdx + 1, 15);
}

function advanceSegment() {
  levelSegIndex++;
  currentDiffLevel = getLevelDiff(levelSegIndex);
  const cfg = DIFF_TABLE[currentDiffLevel];
  segPlatRemain = cfg.platCount;
  // 段切换提示
  const segNum = levelSegIndex + 1;
  const diffNames = ['','✦','✦✦','✦✦✦','✦✦✦✦','★','★★','★★★','★★★★','★★★★✦','★★★★✦✦','★★★★✦✦✦','★★★★✦✦✦✦','✦MAX✦','✦MAX✦','✦MAX✦'];
  toast(`第${segNum}段 ${diffNames[currentDiffLevel] || '✦MAX✦'}`);
}

// ---- 触控：手机版只需左右控制（自动跳跃） ----
// 支持多点触控：可以同时按左右两侧
let activeTouches = {};  // 记录每个 touch 的位置

document.addEventListener('touchstart', e => {
  // 检查是否点击了按钮（兼容微信WebView：用多种方式判断）
  const el = e.target;
  const isBtn = (el.id === 'btnStart' || el.id === 'btnRe' ||
                 (el.closest && (el.closest('#btnStart') || el.closest('#btnRe'))));
  if (isBtn) {
    e.preventDefault();
    e.stopPropagation();
    startGame();
    return;
  }

  // 检查是否在UI覆盖层上（开始界面/结束界面）
  const inOverlay = el.closest && (el.closest('.overlay') || el.closest('#startScreen'));
  if (inOverlay) return; // 不阻止默认行为，也不处理游戏触控

  // 游戏中的触控：阻止默认行为 + 记录触点
  e.preventDefault();
  for (const t of e.changedTouches) {
    activeTouches[t.identifier] = t.clientX;
  }
  updateTouchDirection();
}, {passive:false});

document.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (activeTouches[t.identifier] !== undefined) {
      activeTouches[t.identifier] = t.clientX;
    }
  }
  updateTouchDirection();
}, {passive:false});

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    delete activeTouches[t.identifier];
  }
  updateTouchDirection();
});

document.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) {
    delete activeTouches[t.identifier];
  }
  updateTouchDirection();
});

function updateTouchDirection() {
  // 重置触控方向
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
  tiltX = 0;

  const ids = Object.keys(activeTouches);
  if (ids.length === 0) return;

  // 找到最左和最右的触点
  for (const id of ids) {
    const cx = activeTouches[id];
    if (cx < W * 0.4) {
      keys['ArrowLeft'] = true;
    } else if (cx > W * 0.6) {
      keys['ArrowRight'] = true;
    }
    // 连续方向也用 tiltX 补充（更精细的控制）
    const normX = (cx - W/2) / (W * 0.4);
    const clamp = Math.max(-1, Math.min(1, normX));
    if (Math.abs(clamp) > Math.abs(tiltX)) tiltX = clamp;
  }
}

window.addEventListener('deviceorientation', e => {
  if (e.gamma != null) tiltX = Math.max(-1, Math.min(1, e.gamma/30));
});

  [0,0,0,0,4,4,4,0,0,4,4,4,0,0,0,0],

// 像素颜色映射表
const NIKKI_COLORS = {
  1: '#ffb8d0', // 粉发
  2: '#ffe8de', // 肤色
  3: '#fff5f8', // 白裙
  4: '#ff80a0', // 深粉(鞋/蝴蝶结)
  5: '#603040', // 眼睛深色
  6: '#ffffff', // 眼白
  7: '#ffffff', // 高光（绘制时加更强alpha）
  8: 'rgba(255,130,150,0.55)', // 腮红
  'A': '#ff90b0', // 头发暗部
  'B': 'rgba(255,160,190,0.45)', // 裙花纹
};

// ============================================================
//  离屏 Canvas 缓存：预渲染角色 sprite（性能优化）
//  每种姿态只渲染一次到离屏 canvas，游戏中用 drawImage 贴图
// ============================================================
const _nikkiCache = {};  // key: pose名 → { canvas, w, h, ox, oy }

function _buildSpriteCache(spriteName, spriteData) {
  const px = 2.5;
  const cols = 16;
  const rows = spriteData.length;
  const pad = 8; // 额外边距（给发饰、暗边留空间）
  const cw = cols * px + pad * 2;
  const ch = rows * px + pad * 2;
  const oc = document.createElement('canvas');
  oc.width = Math.ceil(cw);
  oc.height = Math.ceil(ch);
  const c = oc.getContext('2d');

  // 绘制中心偏移 = pad
  const drawOX = pad;
  const drawOY = pad;

  // 1) 主体像素
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const v = spriteData[row][col];
      if (v === 0) continue;
      const color = NIKKI_COLORS[v];
      if (!color) continue;
      c.fillStyle = color;
      c.fillRect(drawOX + col * px, drawOY + row * px, px, px);
    }
  }

  // 2) 暗边（右+下）
  c.fillStyle = 'rgba(0,0,0,0.08)';
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const v = spriteData[row][col];
      if (v === 0) continue;
      const x = drawOX + col * px;
      const y = drawOY + row * px;
      const rightEmpty = col >= cols - 1 || spriteData[row][col + 1] === 0;
      const bottomEmpty = row >= rows - 1 || spriteData[row + 1][col] === 0;
      if (rightEmpty) c.fillRect(x + px - 1, y, 1, px);
      if (bottomEmpty) c.fillRect(x, y + px - 1, px, 1);
    }
  }

  // 3) 小花发饰（固定位置）
  const fx = drawOX + 12 * px;
  const fy = drawOY + 1 * px;
  c.fillStyle = '#ffe080';
  c.fillRect(fx, fy, px, px);
  c.fillStyle = '#ffb0cc';
  c.fillRect(fx - px, fy, px, px);
  c.fillRect(fx + px, fy, px, px);
  c.fillRect(fx, fy - px, px, px);
  c.fillRect(fx, fy + px, px, px);

  _nikkiCache[spriteName] = {
    canvas: oc,
    w: cw, h: ch,
    // drawImage 时的锚点偏移（让角色中心对齐）
    anchorX: pad + cols / 2 * px,
    anchorY: pad + rows / 2 * px,
    rows: rows, cols: cols, px: px, pad: pad
  };
}

// 预渲染眨眼帧（覆盖眼睛区域）—— idle/jump/fall 各一个
function _buildBlinkCache(spriteName, spriteData) {
  const base = _nikkiCache[spriteName];
  if (!base) return;
  const oc = document.createElement('canvas');
  oc.width = base.canvas.width;
  oc.height = base.canvas.height;
  const c = oc.getContext('2d');
  c.drawImage(base.canvas, 0, 0);

  const px = base.px, pad = base.pad;
  const rows = base.rows;
  // 闭眼：覆盖眼睛为肤色
  c.fillStyle = NIKKI_COLORS[2];
  const eyeRow5y = pad + 5 * px;
  const eyeRow6y = pad + 6 * px;
  c.fillRect(pad + 5 * px, eyeRow5y, px * 2, px);
  c.fillRect(pad + 5 * px, eyeRow6y, px * 2, px);
  c.fillRect(pad + 9 * px, eyeRow5y, px * 2, px);
  c.fillRect(pad + 9 * px, eyeRow6y, px * 2, px);
  // 闭眼横线
  c.fillStyle = NIKKI_COLORS[5];
  c.fillRect(pad + 5 * px, eyeRow5y + px * 0.5, px * 2, 1);
  c.fillRect(pad + 9 * px, eyeRow5y + px * 0.5, px * 2, 1);

  _nikkiCache[spriteName + '_blink'] = {
    canvas: oc,
    w: base.w, h: base.h,
    anchorX: base.anchorX, anchorY: base.anchorY,
    rows: base.rows, cols: base.cols, px: base.px, pad: base.pad
  };
}

// 初始化所有缓存
_buildSpriteCache('idle', NIKKI_IDLE);
_buildSpriteCache('jump', NIKKI_JUMP);
_buildSpriteCache('fall', NIKKI_FALL);
_buildSpriteCache('dead', NIKKI_DEAD);
_buildBlinkCache('idle', NIKKI_IDLE);
_buildBlinkCache('jump', NIKKI_JUMP);
_buildBlinkCache('fall', NIKKI_FALL);

// ---- 封面背景动画 ----
(function initStartBg(){
  const cvs = document.getElementById('startBg');
  if (!cvs) return;
  const c = cvs.getContext('2d');
  let w, h, stars = [], petals = [];
  
  function resize() {
    const rect = cvs.parentElement.getBoundingClientRect();
    w = cvs.width = rect.width * (window.devicePixelRatio || 1);
    h = cvs.height = rect.height * (window.devicePixelRatio || 1);
    c.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    // 重新生成星星
    stars = [];
    const rw = rect.width, rh = rect.height;
    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random() * rw,
        y: Math.random() * rh * 0.55,
        r: 0.5 + Math.random() * 1.5,
        twinkle: Math.random() * 6.28,
        speed: 0.5 + Math.random() * 1.5,
      });
    }
    // 花瓣粒子
    petals = [];
    for (let i = 0; i < 12; i++) {
      petals.push({
        x: Math.random() * rw,
        y: Math.random() * rh,
        sz: 2 + Math.random() * 3,
        vx: -0.15 - Math.random() * 0.3,
        vy: 0.2 + Math.random() * 0.4,
        rot: Math.random() * 6.28,
        rotV: 0.01 + Math.random() * 0.03,
        alpha: 0.2 + Math.random() * 0.25,
      });
    }
  }
  resize();
  window.addEventListener('resize', resize);
  
  let frame = 0;
  function draw() {
    if (document.getElementById('ui-start').style.display === 'none') {
      requestAnimationFrame(draw); return;
    }
    const dpr = window.devicePixelRatio || 1;
    const rw = w / dpr, rh = h / dpr;
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    frame++;
    
    // 渐变天空
    const sky = c.createLinearGradient(0, 0, 0, rh);
    sky.addColorStop(0, '#1a1525');
    sky.addColorStop(0.25, '#2a2040');
    sky.addColorStop(0.5, '#3d3058');
    sky.addColorStop(0.7, '#5a4570');
    sky.addColorStop(0.85, '#7a5a78');
    sky.addColorStop(1, '#a07888');
    c.fillStyle = sky;
    c.fillRect(0, 0, rw, rh);
    
    // 微光
    c.fillStyle = 'rgba(255,200,230,0.03)';
    c.beginPath();
    c.arc(rw * 0.5, rh * 0.28, rw * 0.4, 0, 6.28);
    c.fill();
    
    // 星星
    for (const s of stars) {
      const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(frame * 0.03 * s.speed + s.twinkle));
      c.globalAlpha = twinkle * 0.7;
      c.fillStyle = '#fff';
      c.beginPath();
      c.arc(s.x, s.y, s.r, 0, 6.28);
      c.fill();
      // 十字闪光
      if (s.r > 1.2) {
        c.globalAlpha = twinkle * 0.3;
        c.fillRect(s.x - s.r * 2, s.y - 0.3, s.r * 4, 0.6);
        c.fillRect(s.x - 0.3, s.y - s.r * 2, 0.6, s.r * 4);
      }
    }
    c.globalAlpha = 1;
    
    // 远山剪影（3层，由远到近，由淡到深）
    const mountains = [
      { yBase: 0.72, amp: 0.08, freq: 0.008, color: 'rgba(60,40,70,0.5)', offset: 0 },
      { yBase: 0.78, amp: 0.10, freq: 0.012, color: 'rgba(45,30,55,0.65)', offset: 50 },
      { yBase: 0.85, amp: 0.06, freq: 0.018, color: 'rgba(30,20,40,0.8)', offset: 120 },
    ];
    for (const mt of mountains) {
      c.fillStyle = mt.color;
      c.beginPath();
      c.moveTo(0, rh);
      for (let x = 0; x <= rw; x += 2) {
        const ny = rh * mt.yBase - Math.abs(Math.sin((x + mt.offset) * mt.freq)) * rh * mt.amp
          - Math.abs(Math.sin((x + mt.offset) * mt.freq * 2.3 + 1)) * rh * mt.amp * 0.4;
        c.lineTo(x, ny);
      }
      c.lineTo(rw, rh);
      c.closePath();
      c.fill();
    }
    
    // 前景地面
    c.fillStyle = 'rgba(20,15,30,0.9)';
    c.fillRect(0, rh * 0.92, rw, rh * 0.08);
    // 地面草丛装饰
    c.fillStyle = 'rgba(60,80,50,0.4)';
    for (let x = 0; x < rw; x += 8 + Math.sin(x * 0.1) * 3) {
      const gh = 3 + Math.sin(x * 0.3 + 2) * 2;
      c.fillRect(x, rh * 0.92 - gh, 2, gh);
    }
    
    // 右侧高度刻度（暗示攀升玩法）
    c.globalAlpha = 0.12;
    c.strokeStyle = '#fff';
    c.lineWidth = 0.5;
    const scaleX = rw - 18;
    const labels = ['0m','1km','2km','3km','5km','8km','∞'];
    for (let i = 0; i < labels.length; i++) {
      const sy = rh * 0.9 - i * (rh * 0.1);
      if (sy < rh * 0.12) break;
      c.beginPath();
      c.moveTo(scaleX, sy);
      c.lineTo(scaleX + 8, sy);
      c.stroke();
      c.globalAlpha = 0.08;
      c.font = '7px sans-serif';
      c.textAlign = 'right';
      c.fillStyle = '#fff';
      c.fillText(labels[i], scaleX - 2, sy + 3);
      c.globalAlpha = 0.12;
    }
    c.globalAlpha = 1;
    
    // 漂浮花瓣
    for (const p of petals) {
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotV;
      if (p.y > rh + 10) { p.y = -10; p.x = Math.random() * rw; }
      if (p.x < -10) { p.x = rw + 10; }
      c.save();
      c.translate(p.x, p.y);
      c.rotate(p.rot);
      c.globalAlpha = p.alpha;
      // 花瓣形状
      c.fillStyle = '#ffb0d0';
      c.beginPath();
      c.ellipse(0, 0, p.sz, p.sz * 0.5, 0, 0, 6.28);
      c.fill();
      c.fillStyle = 'rgba(255,255,255,0.3)';
      c.beginPath();
      c.ellipse(0, 0, p.sz * 0.4, p.sz * 0.2, 0, 0, 6.28);
      c.fill();
      c.restore();
    }
    c.globalAlpha = 1;
    
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

//  游戏启动 / 重启

function startGame() {
  initAudio();

  // 确保 canvas 尺寸正确（防止异常情况下 W/H 为0）
  resize();

  $start.style.display = 'none';
  $over.style.display  = 'none';
  $hud.style.display   = 'flex';
  startBGM();

  score = 0; maxHeight = 0; cameraY = 0; difficulty = 0; tick = 0;
  platforms = []; items = []; monsters = []; particles = []; floatTexts = [];
  weatherDrops = []; prevBgStage = 0; bgTransition = 1; bgTransFrom = 0; bgTransTo = 0;
  lightningTimer = 150; lightningFlash = 0;
  stopWeatherSfx(); // 重置天气环境音
  nextMilestone = 500; milestoneAnim = null;

  // 关卡段初始化
  levelSegIndex = 0;
  currentDiffLevel = getLevelDiff(0);
  segPlatRemain = DIFF_TABLE[currentDiffLevel].platCount;

  P.x = W/2; P.y = H - 80;
  P.vx = 0;  P.vy = JUMP_VY;   // 开局给一个初始跳跃速度，让游戏立刻动起来
  P.powerUp = null; P.puTimer = 0;
  P.shield = false; P.shieldTimer = 0;
  P.trampolineInv = 0;
  P.dir = 1; P.grounded = false; P.landedPlat = null; P.landCooldown = 0;
  P.hp = 3; P.maxHp = 3; P.hurtInv = 0; P.hurtFlash = false;

  initBgStars();
  seedPlatforms();

  state = 'play';
  lastTime = 0; accumulator = 0; lastRenderTime = 0; // 重置固定时间步+渲染帧率
  if (!window.__raf) { window.__raf = true; requestAnimationFrame(loop); }
}

function endGame() {
  stopBGM();
  stopFeihuaLoop();
  stopWeatherSfx();
  playSfx('death');
  // 掉落出屏幕的死亡 → 直接结算（不需要再播坠落动画）
  showGameOver();
}

// 被怪物碰到 → 触发死亡动画
function triggerDeath() {
  stopBGM();
  stopFeihuaLoop();
  stopWeatherSfx();
  playSfx('death');
  state = 'dying';
  deathAnim.active = true;
  deathAnim.screenX = P.x;
  deathAnim.screenY = P.y - cameraY;
  deathAnim.dir = P.dir;
  deathAnim.vy = -3.9;       // 先向上弹一小段（慢速版）
  deathAnim.timer = 0;
  deathAnim.phase = 'bounce';
  // 碰撞特效
  emitBurst(P.x, P.y, 20, '#ff3366', 4, 40);
  emitBurst(P.x, P.y, 10, '#5a80cc', 3, 30);
}

// 死亡动画更新（在主循环中调用）
function updateDeathAnim() {
  deathAnim.timer++;

  // 向上弹起阶段
  deathAnim.vy += 0.106;  // 重力（慢速版）
  deathAnim.screenY += deathAnim.vy;

  // 粒子效果
  if (deathAnim.timer % 4 === 0) {
    // 将屏幕坐标转回世界坐标来发粒子
    emitBurst(deathAnim.screenX, deathAnim.screenY + cameraY, 2, '#80b0ff', 1.5, 15);
  }

  // 坠出屏幕底部 → 结束
  if (deathAnim.screenY > H + 80) {
    deathAnim.active = false;
    showGameOver();
  }
}

// 真正显示结算界面
function showGameOver() {
  state = 'over';
  $hud.style.display  = 'none';
  $over.style.display  = 'flex';

  const heightM = maxHeight;
  const stage = getBgStage();
  const th = BG_THEMES[stage];

  // 动态背景：根据当前场景设置渐变
  $over.style.background = `linear-gradient(180deg, rgb(${th.top.join(',')}), rgb(${th.mid.join(',')}), rgb(${th.bot.join(',')}))`;

  // 场景标签
  $oScene.textContent = BG_NAMES[stage];

  // 高度（大字）
  $oHeight.textContent = heightM;

  // 分数
  $oScore.textContent = score;

  // 清除旧记录角标
  $recordBadge.innerHTML = '';

  // 检查纪录
  const isNewScore = score > bestScore;
  const isNewHeight = heightM > bestHeight;

  if (isNewScore) {
    bestScore = score;
    localStorage.setItem('nj_best', bestScore);
  }
  if (isNewHeight) {
    bestHeight = heightM;
    localStorage.setItem('nj_bestH', bestHeight);
  }

  $oScoreBest.innerHTML = 'Best: <span class="star-icon" style="font-size:10px">✦</span> ' + bestScore;
  $oHeightBest.textContent = 'Best: ' + bestHeight + ' m';

  // 新纪录角标
  if (isNewScore || isNewHeight) {
    const badge = document.createElement('span');
    badge.className = 'new-record';
    badge.textContent = 'NEW RECORD';
    badge.style.marginTop = '12px';
    $recordBadge.appendChild(badge);
  }

  // ====== 登山路线图 ======
  buildRouteMap(heightM);
}

function buildRouteMap(heightM) {
  $routeMap.innerHTML = '';

  // 区域配置（从顶部到底部排列，顶部=最高海拔）
  const zones = [
    { name: '🏔 极顶之巅',  h: 9000 },
    { name: '🌪 暴风雪峰',  h: 8000 },
    { name: '❄ 雪线冰原',   h: 7000 },
    { name: '🌌 星空山脊',  h: 6000 },
    { name: '🌄 夕阳岩壁',  h: 5000 },
    { name: '🌫 云海栈道',  h: 4000 },
    { name: '⛈ 雷雨悬崖',  h: 3000 },
    { name: '🌧 雨林峡谷',  h: 2000 },
    { name: '🌸 花海山坡',  h: 1000 },
    { name: '🌫 阴天山脚',  h: 0 },
  ];

  // 玩家在第几个区域（从底部数）
  const playerZoneH = Math.min(heightM, 10000);

  // 轨道线
  const track = document.createElement('div');
  track.className = 'route-track';
  $routeMap.appendChild(track);

  // 进度填充线
  const progress = document.createElement('div');
  progress.className = 'route-progress';
  // 进度百分比：基于 0~10000
  const progressPct = Math.min(100, (playerZoneH / 10000) * 100);
  progress.style.height = '0%';
  $routeMap.appendChild(progress);

  // 玩家标记
  const marker = document.createElement('div');
  marker.className = 'route-player-marker';
  marker.style.bottom = '0%';
  $routeMap.appendChild(marker);

  // 节点（从高到低排列）
  for (let i = 0; i < zones.length; i++) {
    const z = zones[i];
    const reached = heightM >= z.h;
    // 当前区域判定：玩家在这个区域但没到下一个
    const isCurrent = (i === 0) ? (heightM >= 9000)
                    : (heightM >= z.h && heightM < zones[i-1].h);

    const node = document.createElement('div');
    node.className = 'route-node';

    // 圆点
    const dot = document.createElement('div');
    dot.className = 'route-dot' + (isCurrent ? ' current' : reached ? ' reached' : '');
    node.appendChild(dot);

    // 区域名
    const label = document.createElement('span');
    label.className = 'route-label' + (isCurrent ? ' current' : reached ? ' reached' : '');
    label.textContent = z.name;
    node.appendChild(label);

    // 高度标注
    const hLabel = document.createElement('span');
    hLabel.className = 'route-height' + (reached ? ' reached' : '');
    hLabel.textContent = z.h === 0 ? '0m' : z.h / 1000 + 'km';
    node.appendChild(hLabel);

    $routeMap.appendChild(node);
  }

  // 延迟动画：进度条和玩家标记
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      progress.style.height = progressPct + '%';
      marker.style.bottom = progressPct + '%';
    });
  });
}
